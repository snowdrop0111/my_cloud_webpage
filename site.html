<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soft Cloud</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #f8f6ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 50px 40px;
        width: 380px;
        border-radius: 25px;
        box-shadow: 0 15px 30px rgba(200, 190, 255, 0.25);
        text-align: center;
    }

    h1 {
        margin: 0;
        font-size: 28px;
        color: #7b6cf6;
    }

    .subtitle {
        margin-top: 8px;
        margin-bottom: 30px;
        font-size: 14px;
        color: #999;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 12px;
        border: 1px solid #e4e1ff;
        background: #faf9ff;
        font-size: 14px;
        outline: none;
    }

    input:focus {
        border-color: #b8b2ff;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 15px;
        background: #9f94ff;
        color: white;
        font-size: 15px;
        cursor: pointer;
    }

    button:hover {
        background: #7b6cf6;
    }

    .footer {
        margin-top: 25px;
        font-size: 12px;
        color: #bbb;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Welcome 🤍</h1>
    <div class="subtitle">A soft little website</div>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button>Login</button>

    <div class="footer">
        Made with calm vibes ✨
    </div>
</div>

</body>
</html>
